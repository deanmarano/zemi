name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/benchmark.sh"
      - "docker-compose.benchmark.yml"
      - ".github/workflows/benchmark.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "test/benchmark.sh"
      - "docker-compose.benchmark.yml"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:
  schedule:
    # Weekly on Sundays at 06:00 UTC
    - cron: "0 6 * * 0"

permissions:
  contents: read

jobs:
  # ── Job 1: Zemi benchmarks (isolated PG instances) ──────────────────────────
  zemi:
    name: Zemi Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres-source:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bench_source
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: md5
          POSTGRES_INITDB_ARGS: "--auth-host=md5"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5440:5432
      postgres-dest:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bench_dest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: md5
          POSTGRES_INITDB_ARGS: "--auth-host=md5"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5441:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Configure source PostgreSQL for logical replication
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "ALTER SYSTEM SET wal_level = 'logical';"
          psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "ALTER SYSTEM SET max_replication_slots = 4;"
          psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "ALTER SYSTEM SET max_wal_senders = 4;"

          # Restart to apply wal_level change
          SOURCE_CONTAINER=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '5440->5432' | awk '{print $1}')
          docker restart "$SOURCE_CONTAINER"
          sleep 3

          # Wait for PostgreSQL to be ready
          for i in $(seq 1 30); do
            if psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "SELECT 1;" >/dev/null 2>&1; then
              echo "Source PostgreSQL is ready"
              break
            fi
            sleep 1
          done

      - name: Build Zemi
        run: zig build

      - name: Run Zemi benchmarks
        run: ./test/benchmark.sh --zemi-only --skip-docker --no-build

      - name: Upload Zemi results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zemi-results
          path: /tmp/benchmark-results/zemi
          retention-days: 7

  # ── Job 2: Bemi benchmarks (isolated PG instances) ──────────────────────────
  bemi:
    name: Bemi Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres-source:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bench_source
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: md5
          POSTGRES_INITDB_ARGS: "--auth-host=md5"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5440:5432
      postgres-dest:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bench_dest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: md5
          POSTGRES_INITDB_ARGS: "--auth-host=md5"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5441:5432

    steps:
      - uses: actions/checkout@v4

      - name: Configure source PostgreSQL for logical replication
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "ALTER SYSTEM SET wal_level = 'logical';"
          psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "ALTER SYSTEM SET max_replication_slots = 4;"
          psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "ALTER SYSTEM SET max_wal_senders = 4;"

          # Restart to apply wal_level change
          SOURCE_CONTAINER=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '5440->5432' | awk '{print $1}')
          docker restart "$SOURCE_CONTAINER"
          sleep 3

          # Wait for PostgreSQL to be ready
          for i in $(seq 1 30); do
            if psql -h 127.0.0.1 -p 5440 -U postgres -d bench_source -c "SELECT 1;" >/dev/null 2>&1; then
              echo "Source PostgreSQL is ready"
              break
            fi
            sleep 1
          done

      - name: Pull Bemi image
        run: docker pull public.ecr.aws/bemi/dev:latest

      - name: Run Bemi benchmarks
        run: ./test/benchmark.sh --bemi-only --skip-docker

      - name: Upload Bemi results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bemi-results
          path: /tmp/benchmark-results/bemi
          retention-days: 7

  # ── Job 3: Combine results and generate summary ─────────────────────────────
  summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [zemi, bemi]
    if: always()
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download Zemi results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: zemi-results
          path: /tmp/benchmark-results

      - name: Download Bemi results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: bemi-results
          path: /tmp/benchmark-results

      - name: Rename result files
        run: |
          # download-artifact places files in the path directory directly
          # The uploaded file was /tmp/benchmark-results/zemi (a file, not dir)
          # download-artifact downloads it to /tmp/benchmark-results/zemi (same name)
          # For bemi, it downloads to /tmp/benchmark-results/bemi
          # Verify the files exist
          echo "=== Zemi results ==="
          cat /tmp/benchmark-results/zemi 2>/dev/null || echo "(not found)"
          echo ""
          echo "=== Bemi results ==="
          cat /tmp/benchmark-results/bemi 2>/dev/null || echo "(not found)"

      - name: Generate summary
        run: |
          # generate_summary writes to $GITHUB_STEP_SUMMARY if set, else /tmp/benchmark-summary.md
          # Unset GITHUB_STEP_SUMMARY so we write to a file first, then append it ourselves
          # (this avoids issues if the script also prints to stdout)
          unset GITHUB_STEP_SUMMARY
          ./test/benchmark.sh --summary-only

      - name: Show benchmark summary
        if: always()
        run: |
          if [ -f /tmp/benchmark-summary.md ]; then
            cat /tmp/benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "=== Benchmark Summary ==="
            cat /tmp/benchmark-summary.md
          else
            echo "No benchmark summary found"
          fi
