name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Check formatting
        run: zig fmt --check src/ build.zig

      - name: Run tests
        run: zig build test

      - name: Build (verify compilation)
        run: zig build

  cross-compile:
    name: Cross-Compile (${{ matrix.label }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - label: x86_64-linux
            target: x86_64-linux-musl
          - label: aarch64-linux
            target: aarch64-linux-musl
          - label: x86_64-macos
            target: x86_64-macos-none
          - label: aarch64-macos
            target: aarch64-macos-none
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Build for ${{ matrix.label }}
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Report binary size
        run: |
          BINARY="zig-out/bin/zemi"
          SIZE_BYTES=$(stat --format=%s "$BINARY")
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES/1048576}")
          echo "### Binary Size: ${{ matrix.label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`${{ matrix.label }}\` | ${SIZE_MB} MB (${SIZE_BYTES} bytes) |" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Binary size (${{ matrix.label }})::${SIZE_MB} MB (${SIZE_BYTES} bytes)"

  e2e:
    name: E2E Tests (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        pg: [14, 15, 16, 17]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zemi_test
          POSTGRES_HOST_AUTH_METHOD: md5
          POSTGRES_INITDB_ARGS: "--auth-host=md5"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5433:5432
      postgres-scram:
        image: postgres:${{ matrix.pg }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zemi_test
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5434:5432
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Configure PostgreSQL instances for logical replication
        env:
          PGPASSWORD: postgres
        run: |
          # Configure MD5 instance (port 5433)
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET wal_level = 'logical';"
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET max_replication_slots = 4;"
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET max_wal_senders = 4;"
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET password_encryption = 'md5';"

          # Configure SCRAM instance (port 5434)
          psql -h 127.0.0.1 -p 5434 -U postgres -d zemi_test -c "ALTER SYSTEM SET wal_level = 'logical';"
          psql -h 127.0.0.1 -p 5434 -U postgres -d zemi_test -c "ALTER SYSTEM SET max_replication_slots = 4;"
          psql -h 127.0.0.1 -p 5434 -U postgres -d zemi_test -c "ALTER SYSTEM SET max_wal_senders = 4;"

          # Restart both instances to apply wal_level (requires restart, not just reload)
          # Get container IDs by mapped port
          MD5_CONTAINER=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '5433->5432' | awk '{print $1}')
          SCRAM_CONTAINER=$(docker ps --format '{{.ID}} {{.Ports}}' | grep '5434->5432' | awk '{print $1}')
          docker restart "$MD5_CONTAINER" "$SCRAM_CONTAINER"
          sleep 3

          # Wait for both instances to be ready
          for i in $(seq 1 30); do
            MD5_READY=false
            SCRAM_READY=false
            if psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "SELECT 1;" >/dev/null 2>&1; then MD5_READY=true; fi
            if psql -h 127.0.0.1 -p 5434 -U postgres -d zemi_test -c "SELECT 1;" >/dev/null 2>&1; then SCRAM_READY=true; fi
            if [ "$MD5_READY" = true ] && [ "$SCRAM_READY" = true ]; then break; fi
            sleep 1
          done

      - name: Build and start SSL PostgreSQL
        run: |
          # Build the SSL PostgreSQL image with the matrix PG version
          docker build -t postgres-ssl-test \
            --build-arg PG_VERSION=${{ matrix.pg }} \
            -f test/Dockerfile.postgres-ssl .

          # Run the SSL PostgreSQL container
          docker run -d --name postgres-ssl \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=zemi_test \
            -e POSTGRES_HOST_AUTH_METHOD=md5 \
            -e "POSTGRES_INITDB_ARGS=--auth-host=md5" \
            -p 5435:5432 \
            postgres-ssl-test \
            postgres \
            -c wal_level=logical \
            -c max_replication_slots=4 \
            -c max_wal_senders=4 \
            -c password_encryption=md5 \
            -c ssl=on \
            -c ssl_cert_file=/var/lib/postgresql/ssl/server.crt \
            -c ssl_key_file=/var/lib/postgresql/ssl/server.key

          # Wait for SSL PostgreSQL to be ready
          for i in $(seq 1 30); do
            if PGPASSWORD=postgres psql -h 127.0.0.1 -p 5435 -U postgres -d zemi_test -c "SELECT 1;" >/dev/null 2>&1; then
              echo "SSL PostgreSQL is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "WARNING: SSL PostgreSQL did not become ready in time"
            fi
            sleep 1
          done

      - name: Run E2E tests
        run: ./test/e2e.sh --no-docker

  docker-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release
    needs: [test, e2e, cross-compile]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Build release binaries
        run: zig build release

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp zig-out/x86_64-linux/zemi release/zemi-x86_64-linux
          cp zig-out/aarch64-linux/zemi release/zemi-aarch64-linux
          cp zig-out/x86_64-macos/zemi release/zemi-x86_64-macos
          cp zig-out/aarch64-macos/zemi release/zemi-aarch64-macos
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  docker:
    name: Docker
    needs: [test, e2e]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
