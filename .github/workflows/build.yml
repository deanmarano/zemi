name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Run tests
        run: zig build test

      - name: Build (verify compilation)
        run: zig build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zemi_test
          POSTGRES_HOST_AUTH_METHOD: md5
          POSTGRES_INITDB_ARGS: "--auth-host=md5"
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5433:5432
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Configure PostgreSQL for logical replication
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET wal_level = 'logical';"
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET max_replication_slots = 4;"
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET max_wal_senders = 4;"
          psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "ALTER SYSTEM SET password_encryption = 'md5';"
          # Restart postgres to apply wal_level change (requires restart, not just reload)
          docker restart $(docker ps -q --filter ancestor=postgres:16-alpine)
          sleep 3
          # Wait for postgres to be ready again
          for i in $(seq 1 30); do
            if psql -h 127.0.0.1 -p 5433 -U postgres -d zemi_test -c "SELECT 1;" >/dev/null 2>&1; then break; fi
            sleep 1
          done

      - name: Run E2E tests
        run: ./test/e2e.sh --no-docker

  release:
    name: Release
    needs: [test, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Build release binaries
        run: zig build release

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp zig-out/x86_64-linux/zemi release/zemi-x86_64-linux
          cp zig-out/aarch64-linux/zemi release/zemi-aarch64-linux
          cp zig-out/x86_64-macos/zemi release/zemi-x86_64-macos
          cp zig-out/aarch64-macos/zemi release/zemi-aarch64-macos
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  docker:
    name: Docker
    needs: [test, e2e]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
